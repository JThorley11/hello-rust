<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }
        .crab-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .crab {
            font-size: 100px;
            margin-bottom: 20px;
        }
        .speech-bubble {
            background-color: #e1f5fe;
            border: 2px solid #0277bd;
            border-radius: 20px;
            padding: 20px;
            margin: 20px auto;
            max-width: 400px;
            position: relative;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid #0277bd;
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 18px solid #e1f5fe;
        }
    </style>
</head>
<body>
    <div class="crab-container">
        <div class="speech-bubble">
            <p style="font-size: 24px; margin: 0;">If only I could walk forwards!</p>
        </div>
        <div class="crab">🦀</div>
    </div>
</body>
</html>
